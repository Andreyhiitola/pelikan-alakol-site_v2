<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Меню столовой — Пеликан Алаколь</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Arial', sans-serif;
    color: #fff;
    min-height: 100vh;
    background: url('img/bg-wood.jpg') center/cover fixed no-repeat, #3a2416;
}

/* ===== Header ===== */
header {
    background: linear-gradient(135deg, rgba(45,134,89,.95), rgba(76,168,118,.95));
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
    position: sticky;
    top: 0;
    z-index: 100;
}

.back-btn {
    background: rgba(255,255,255,.15);
    border: 2px solid rgba(255,255,255,.3);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .88em;
    font-weight: 600;
    transition: background .25s;
    white-space: nowrap;
}
.back-btn:hover { background: rgba(255,255,255,.28); }

.header-center {
    flex: 1;
    text-align: center;
}
.header-center h1 {
    font-size: 1.15em;
    font-weight: 700;
    color: #FFD700;
    text-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.header-center .menu-date {
    font-size: .8em;
    opacity: .85;
    margin-top: 2px;
}

.print-btn {
    background: rgba(255,255,255,.15);
    border: 2px solid rgba(255,255,255,.3);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: .88em;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .25s;
    white-space: nowrap;
}
.print-btn:hover { background: rgba(255,255,255,.28); }

/* ===== Main ===== */
main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 40px 80px;
    background: rgba(255,255,255,.07);
    backdrop-filter: blur(3px);
    border-radius: 0 0 20px 20px;
}

/* ===== Schedule block ===== */
#scheduleBlock {
    display: none;
    margin-bottom: 28px;
}
.schedule-grid {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
}
.schedule-item {
    background: rgba(255,255,255,.12);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,.2);
    padding: 14px 22px;
    border-radius: 15px;
    text-align: center;
    transition: all .25s;
    min-width: 130px;
}
.schedule-item:hover {
    background: rgba(255,255,255,.18);
}
.schedule-item.active {
    background: linear-gradient(135deg, rgba(45,134,89,.85), rgba(76,168,118,.85));
    border-color: rgba(255,255,255,.5);
    box-shadow: 0 4px 18px rgba(45,134,89,.5);
}
.schedule-item .emoji { font-size: 1.6em; display: block; margin-bottom: 6px; }
.schedule-item .meal-name { font-weight: 700; font-size: .95em; margin-bottom: 4px; }
.schedule-item .time { font-size: .8em; opacity: .8; }
.schedule-item.active .time { opacity: 1; font-weight: 600; }

/* ===== Controls ===== */
.controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
}

.search-box {
    flex: 1;
    min-width: 200px;
    padding: 10px 18px;
    border-radius: 25px;
    border: 2px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.12);
    color: #fff;
    font-size: .9em;
    backdrop-filter: blur(6px);
    transition: border-color .2s;
}
.search-box::placeholder { color: rgba(255,255,255,.55); }
.search-box:focus {
    outline: none;
    border-color: rgba(255,255,255,.5);
    background: rgba(255,255,255,.18);
}

/* ===== Category pills ===== */
.category-filter {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
}

.category-btn {
    padding: 9px 20px;
    border-radius: 25px;
    background: rgba(255,255,255,.12);
    color: #fff;
    border: 2px solid rgba(255,255,255,.2);
    cursor: pointer;
    font-weight: 600;
    font-size: .85em;
    letter-spacing: .05em;
    backdrop-filter: blur(6px);
    transition: all .2s;
    font-family: inherit;
}
.category-btn:hover {
    background: rgba(255,255,255,.2);
}
.category-btn.active {
    background: linear-gradient(135deg, #ff6b35, #f7931e);
    border-color: rgba(255,255,255,.5);
    box-shadow: 0 4px 15px rgba(255,107,53,.4);
}

/* ===== Section title ===== */
.section-title {
    color: #fff;
    border-bottom: 3px solid #ff6b35;
    padding-bottom: 10px;
    margin-bottom: 18px;
    font-size: 1.4em;
    font-weight: 700;
    text-shadow: 0 2px 6px rgba(0,0,0,.5);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
}

.menu-section { margin-bottom: 40px; }

/* ===== Dish grid ===== */
.menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
}

.dish-card {
    background: rgba(255,255,255,.97);
    color: #1a1a1a;
    border-radius: 14px;
    padding: 16px 18px 16px 22px;
    box-shadow: 0 4px 16px rgba(0,0,0,.22);
    display: flex;
    flex-direction: column;
    transition: all .25s;
    border-left: 4px solid #ccc;
}
.dish-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,.3);
}
/* Цвет полоски зависит от категории — задаётся в JS через data-category */
.dish-card[data-category="Завтрак"] { border-left-color: #f7931e; }
.dish-card[data-category="Обед"]    { border-left-color: #2d8659; }
.dish-card[data-category="Ужин"]    { border-left-color: #0088cc; }

.dish-name {
    font-size: 1em;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 5px;
    flex: 1;
    line-height: 1.35;
}
.dish-weight {
    font-size: .82em;
    color: #888;
    font-style: italic;
    margin-bottom: 10px;
}
.dish-price {
    font-size: 1.25em;
    font-weight: 700;
    color: #2d8659;
    margin-top: auto;
}

/* ===== Empty / error state ===== */
.empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,.7);
}
.empty-state h2 { font-size: 1.5em; margin-bottom: 10px; }

/* ===== Print ===== */
@media print {
    body { background: #fff !important; color: #000 !important; padding: 0 !important; }
    header, .controls, .category-filter { display: none !important; }
    .section-title { color: #000 !important; border-bottom-color: #333 !important; }
    .menu-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
    .dish-card { box-shadow: none !important; border: 1px solid #ccc !important; break-inside: avoid; }
    .dish-price { color: #000 !important; }
}

/* ===== Mobile ===== */
@media (max-width: 768px) {
    header { padding: 12px 16px; }
    main { padding: 16px 14px 60px; }
    .menu-grid { grid-template-columns: 1fr; }
    .header-center h1 { font-size: 1em; }
}
</style>
</head>
<body>

<header>
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> На главную
    </a>
    <div class="header-center">
        <h1><i class="fas fa-utensils"></i> Столовая Пеликан</h1>
        <div class="menu-date" id="menuDate">Загрузка…</div>
    </div>
    <button class="print-btn" onclick="window.print()">
        <i class="fas fa-print"></i> Печать
    </button>
</header>

<main>
    <!-- Расписание работы -->
    <div id="scheduleBlock">
        <div class="schedule-grid">
            <div class="schedule-item" data-meal="breakfast">
                <span class="emoji">🌅</span>
                <div class="meal-name">Завтрак</div>
                <div class="time">08:00 – 10:30</div>
            </div>
            <div class="schedule-item" data-meal="lunch">
                <span class="emoji">🌞</span>
                <div class="meal-name">Обед</div>
                <div class="time">12:00 – 15:30</div>
            </div>
            <div class="schedule-item" data-meal="dinner">
                <span class="emoji">🌙</span>
                <div class="meal-name">Ужин</div>
                <div class="time">17:30 – 20:00</div>
            </div>
        </div>
    </div>

    <!-- Поиск -->
    <div class="controls">
        <input type="text" class="search-box" id="searchBox"
               placeholder="&#xf002;  Поиск блюда…" oninput="filterMenu()">
    </div>

    <!-- Фильтр категорий -->
    <div class="category-filter">
        <button class="category-btn active" onclick="filterByCategory('Все', this)">Все</button>
        <button class="category-btn" onclick="filterByCategory('Завтрак', this)">🌅 Завтрак</button>
        <button class="category-btn" onclick="filterByCategory('Обед', this)">🍲 Обед</button>
        <button class="category-btn" onclick="filterByCategory('Ужин', this)">🌙 Ужин</button>
    </div>

    <!-- Меню -->
    <div id="menuContainer">
        <div class="empty-state"><p>Загрузка меню…</p></div>
    </div>
</main>

<script>
let currentCategory = 'Все';
let globalMenuData = {};

function displaySchedule(schedule) {
    const block = document.getElementById('scheduleBlock');
    if (!block) return;
    block.style.display = 'block';

    const now = new Date();
    const cur = now.getHours() * 60 + now.getMinutes();

    Object.keys(schedule).forEach(key => {
        const meal = schedule[key];
        const [sh, sm] = meal.start.split(':').map(Number);
        const [eh, em] = meal.end.split(':').map(Number);
        if (cur >= sh * 60 + sm && cur <= eh * 60 + em) {
            const el = document.querySelector(`[data-meal="${key}"]`);
            if (el) el.classList.add('active');
        }
    });
}

async function loadMenu() {
    try {
        const response = await fetch('menu.json?v=' + Date.now());
        if (!response.ok) throw new Error('Файл menu.json не найден');
        const jsonData = await response.json();

        if (jsonData.schedule) displaySchedule(jsonData.schedule);

        let dishes = [];
        if (Array.isArray(jsonData)) dishes = jsonData;
        else if (jsonData.menu)   dishes = jsonData.menu;
        else if (jsonData.dishes) dishes = jsonData.dishes;

        if (!dishes.length) throw new Error('Меню пустое');

        globalMenuData = {
            'Завтрак': dishes.filter(d => d.category === 'Завтрак'),
            'Обед':    dishes.filter(d => d.category === 'Обед'),
            'Ужин':    dishes.filter(d => d.category === 'Ужин'),
        };

        document.getElementById('menuDate').textContent =
            new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });

        renderMenu();
    } catch (err) {
        console.error(err);
        document.getElementById('menuContainer').innerHTML = `
            <div class="empty-state">
                <h2>❌ Ошибка загрузки меню</h2>
                <p>${err.message}</p>
            </div>`;
    }
}

function renderMenu() {
    const search = document.getElementById('searchBox').value.toLowerCase();
    const container = document.getElementById('menuContainer');
    container.innerHTML = '';

    const icons = { 'Завтрак': '🌅', 'Обед': '🍲', 'Ужин': '🌙' };
    const cats = currentCategory === 'Все' ? Object.keys(globalMenuData) : [currentCategory];
    let hasResults = false;

    cats.forEach(cat => {
        const dishes = (globalMenuData[cat] || []).filter(d =>
            d.name.toLowerCase().includes(search)
        );
        if (!dishes.length) return;
        hasResults = true;

        const section = document.createElement('div');
        section.className = 'menu-section';
        section.innerHTML = `
            <h2 class="section-title">${icons[cat] || '🍽️'} ${cat}</h2>
            <div class="menu-grid">
                ${dishes.map(d => `
                    <div class="dish-card" data-category="${cat}">
                        <div class="dish-name">${d.name}</div>
                        <div class="dish-weight">${d.weight || ''}</div>
                        <div class="dish-price">${Number(d.price).toLocaleString('ru-RU')} ₸</div>
                    </div>`).join('')}
            </div>`;
        container.appendChild(section);
    });

    if (!hasResults) {
        container.innerHTML = `
            <div class="empty-state">
                <h2>🍽️ Блюда не найдены</h2>
                <p>Попробуйте изменить запрос или категорию</p>
            </div>`;
    }
}

function filterByCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderMenu();
}

function filterMenu() { renderMenu(); }

// Telegram Mini App
if (window.Telegram?.WebApp?.initData) {
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    const back = document.querySelector('.back-btn');
    if (back) back.style.display = 'none';
}

loadMenu();
</script>
</body>
</html>
