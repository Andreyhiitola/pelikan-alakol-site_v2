<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Номер — Пеликан Алаколь</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --green:       #1e7a4a;
      --green-dark:  #155c38;
      --green-light: #e8f5ee;
      --gold:        #c9a227;
      --text:        #1a2a1f;
      --text-muted:  #5a6e5e;
      --white:       #ffffff;
      --bg:          #f7faf8;
      --bg-alt:      #eef4f0;
      --border:      #d4e4da;
      --radius:      16px;
      --shadow:      0 4px 24px rgba(30,122,74,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg); line-height: 1.6; }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; line-height: 1.25; }
    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* TOP BAR */
    .top-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .top-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .back-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--green);
      font-weight: 500;
      font-size: .9rem;
      padding: 8px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      transition: background .2s;
    }
    .back-link:hover { background: var(--green-light); }
    .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--green);
    }
    .book-btn-top {
      background: var(--green);
      color: var(--white);
      font-weight: 600;
      font-size: .85rem;
      padding: 9px 20px;
      border-radius: 10px;
      transition: background .2s;
    }
    .book-btn-top:hover { background: var(--green-dark); }

    /* MAIN LAYOUT */
    main { padding: 40px 0 80px; }

    /* ROOM IMAGE */
    .room-hero {
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 36px;
      box-shadow: var(--shadow);
      background: var(--bg-alt);
      max-height: 500px;
    }
    .room-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ROOM HEADER */
    .room-header { margin-bottom: 28px; }
    .room-icon { font-size: 2rem; margin-bottom: 8px; }
    .room-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--text);
      margin-bottom: 12px;
    }
    .room-desc { color: var(--text-muted); font-size: 1rem; line-height: 1.7; }

    /* SPECS */
    .specs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 28px 0;
    }
    @media (max-width: 600px) { .specs { grid-template-columns: 1fr 1fr; } }
    .spec-item {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .spec-icon { font-size: 1.4rem; color: var(--green); width: 28px; text-align: center; }
    .spec-label { font-size: .75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
    .spec-value { font-weight: 600; font-size: .95rem; }

    /* PRICE TABLE */
    .section-label {
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--green);
      margin-bottom: 14px;
    }
    .price-table-wrap {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 36px;
    }
    .price-table { width: 100%; border-collapse: collapse; }
    .price-table th, .price-table td {
      padding: 14px 20px;
      text-align: left;
      font-size: .9rem;
      border-bottom: 1px solid var(--border);
    }
    .price-table tr:last-child td { border-bottom: none; }
    .price-table th {
      background: var(--bg-alt);
      font-weight: 600;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .price-table td:last-child { font-weight: 600; color: var(--green); }
    .price-table tr:hover td { background: var(--green-light); }
    .no-price { padding: 20px; color: var(--text-muted); font-style: italic; }

    /* BOOKING CTA */
    .booking-cta {
      background: var(--green);
      border-radius: var(--radius);
      padding: 36px;
      text-align: center;
      color: var(--white);
    }
    .booking-cta h3 { font-size: 1.4rem; margin-bottom: 8px; }
    .booking-cta p { opacity: .85; margin-bottom: 24px; font-size: .95rem; }
    .booking-cta a {
      background: var(--white);
      color: var(--green);
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 12px;
      font-size: 1rem;
      display: inline-block;
      transition: transform .2s;
    }
    .booking-cta a:hover { transform: translateY(-2px); }

    /* LOADING / ERROR */
    .state-box {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .state-box i { font-size: 2.5rem; color: var(--green); margin-bottom: 16px; }
    .state-box h2 { margin-bottom: 8px; }
    .state-box a { color: var(--green); font-weight: 600; text-decoration: underline; }
    .error-box { color: #b91c1c; }
    .error-box i { color: #b91c1c; }
  /* Lang switcher */
  .lang-switcher { display: flex; gap: 2px; align-items: center; }
  .lang-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: .7rem; font-weight: 600; padding: 3px 7px; border-radius: 5px; cursor: pointer; transition: all .2s; }
  .lang-btn:hover, .lang-btn--active { background: var(--green-light); color: var(--green); border-color: var(--green); }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="container">
      <div class="top-bar-inner">
        <a href="index.html#rooms" class="back-link">
          <i class="fas fa-arrow-left"></i> <span data-i18n="acc.back">К номерам</span>
        </a>
        <span class="site-name">Пеликан Алаколь</span>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="lang-switcher"></div>
          <a href="booking.html" class="book-btn-top">
            <i class="fas fa-calendar-alt"></i> <span data-i18n="acc.book">Забронировать</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <main>
    <div class="container">
      <div id="roomContainer">
        <div class="state-box">
          <i class="fas fa-spinner fa-spin"></i>
          <p data-i18n="acc.loading">Загрузка...</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    const CONFIG = {
      getDataFile: f => './' + f
    };

    async function loadRoom() {
      const container = document.getElementById('roomContainer');
      try {
        const params = new URLSearchParams(window.location.search);
        const roomId = params.get('id');
        if (!roomId) throw new Error('ID номера не указан');

        const res = await fetch(CONFIG.getDataFile('accommodation.json'));
        if (!res.ok) throw new Error('Ошибка загрузки данных');
        const rooms = await res.json();

        const room = rooms.find(r => r.id === roomId);
        if (!room) throw new Error('Номер не найден: ' + roomId);

        document.title = room.name + ' — Пеликан Алаколь';

        // Build price table rows
        const prices = room.prices || {};
        const priceEntries = Object.entries(prices);
        const allDash = priceEntries.every(([, v]) => v === '-');
        let priceHtml;
        const i = window.i18n;
        if (allDash || priceEntries.length === 0) {
          priceHtml = `<div class="no-price" data-i18n="acc.price.noprice">Цена уточняется — позвоните нам</div>`;
        } else {
          const rows = priceEntries.map(([period, price]) => {
            const val = price === '-'
              ? `<span style="color:var(--text-muted)" data-i18n="acc.price.request">По запросу</span>`
              : price + ' ₸';
            return `<tr><td>${period}</td><td>${val}</td></tr>`;
          }).join('');
          priceHtml = `
            <table class="price-table">
              <thead><tr><th data-i18n="acc.price.period">Период</th><th data-i18n="acc.price.perday">Цена / сутки</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>`;
        }

        const capVal = i?.tr('acc.spec.capacity.val', 'до {n} чел.').replace('{n}', room.capacity) || `до ${room.capacity} чел.`;

        container.innerHTML = `
          <div class="room-hero">
            <img src="${room.imageFull || room.imageThumb}" alt="${room.name}"
                 onerror="this.parentElement.style.display='none'">
          </div>

          <div class="room-header">
            <div class="room-icon">${room.icon || '🏠'}</div>
            <h1 class="room-title">${room.name}</h1>
            <p class="room-desc">${room.descriptionFull || room.description || ''}</p>
          </div>

          <div class="specs">
            <div class="spec-item">
              <div class="spec-icon"><i class="fas fa-expand-arrows-alt"></i></div>
              <div>
                <div class="spec-label" data-i18n="acc.spec.area">Площадь</div>
                <div class="spec-value">${room.area} м²</div>
              </div>
            </div>
            <div class="spec-item">
              <div class="spec-icon"><i class="fas fa-users"></i></div>
              <div>
                <div class="spec-label" data-i18n="acc.spec.capacity">Вместимость</div>
                <div class="spec-value">${capVal}</div>
              </div>
            </div>
            <div class="spec-item">
              <div class="spec-icon"><i class="fas fa-shower"></i></div>
              <div>
                <div class="spec-label" data-i18n="acc.spec.bathroom">Санузел</div>
                <div class="spec-value">${room.bathroom || '—'}</div>
              </div>
            </div>
          </div>

          <div class="section-label" data-i18n="acc.price.title">Стоимость проживания</div>
          <div class="price-table-wrap">${priceHtml}</div>

          <div class="booking-cta">
            <h3 data-i18n="acc.cta.title">Хотите забронировать?</h3>
            <p data-i18n="acc.cta.sub">Выберите удобные даты в нашей системе онлайн-бронирования</p>
            <a href="booking.html"><i class="fas fa-calendar-alt"></i>&nbsp; <span data-i18n="acc.cta.btn">Забронировать</span></a>
          </div>
        `;
        if (i?.apply) i.apply();
      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="state-box error-box">
            <i class="fas fa-exclamation-triangle"></i>
            <h2 data-i18n="acc.error.title">Ошибка</h2>
            <p>${err.message}</p>
            <br>
            <a href="index.html" data-i18n="acc.error.home">Вернуться на главную</a>
          </div>`;
        if (window.i18n?.apply) window.i18n.apply();
      }
    }

    document.addEventListener('DOMContentLoaded', loadRoom);
  </script>
  <script src="js/i18n.js"></script>
</body>
</html>
