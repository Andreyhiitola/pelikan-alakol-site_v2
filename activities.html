<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Активности и досуг — Пеликан Алаколь</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --green:       #1e7a4a;
      --green-dark:  #155c38;
      --green-light: #e8f5ee;
      --text:        #1a2a1f;
      --text-muted:  #5a6e5e;
      --white:       #ffffff;
      --bg:          #f7faf8;
      --bg-alt:      #eef4f0;
      --border:      #d4e4da;
      --radius:      16px;
      --shadow:      0 4px 24px rgba(30,122,74,.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg); line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    h1, h2 { font-family: 'Playfair Display', serif; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* TOP BAR */
    .top-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .top-bar-inner { display: flex; align-items: center; justify-content: space-between; }
    .back-link {
      display: flex; align-items: center; gap: 8px;
      color: var(--green); font-weight: 500; font-size: .9rem;
      padding: 8px 16px; border-radius: 10px; border: 1.5px solid var(--border);
      transition: background .2s;
    }
    .back-link:hover { background: var(--green-light); }
    .site-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--green); }

    /* MAIN */
    main { padding: 48px 0 80px; }
    .page-header { margin-bottom: 40px; }
    .section-tag {
      display: inline-block;
      background: var(--green-light);
      color: var(--green);
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .page-title { font-size: clamp(1.8rem, 4vw, 2.4rem); margin-bottom: 8px; }
    .page-subtitle { color: var(--text-muted); }

    /* GRID */
    .act-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* CARD */
    .act-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .act-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(30,122,74,.14);
    }
    .act-icon { font-size: 2.6rem; margin-bottom: 16px; }
    .act-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 10px; }
    .act-time {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--green-light); color: var(--green);
      font-size: .8rem; font-weight: 600;
      padding: 4px 12px; border-radius: 20px;
      margin-bottom: 12px;
    }
    .act-desc { color: var(--text-muted); font-size: .9rem; line-height: 1.6; margin-bottom: 14px; }
    .act-location {
      display: flex; align-items: center; gap: 6px;
      font-size: .8rem; color: var(--text-muted);
    }
    .act-location i { color: var(--green); font-size: .7rem; }

    /* ICON MAP */
    .icon-ferry::before    { content: "⛴️"; }
    .icon-animation::before { content: "🎭"; }
    .icon-pools::before    { content: "🏊"; }
    .icon-shop::before     { content: "🛍️"; }
    .icon-evening::before  { content: "🎶"; }
    .icon-bar::before      { content: "🎱"; }
    .icon-default::before  { content: "🌟"; }

    /* LOADING */
    .loading { text-align: center; padding: 80px; color: var(--text-muted); }
  /* Lang switcher */
  .lang-switcher { display: flex; gap: 2px; align-items: center; }
  .lang-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: .7rem; font-weight: 600; padding: 3px 7px; border-radius: 5px; cursor: pointer; transition: all .2s; }
  .lang-btn:hover, .lang-btn--active { background: var(--green-light); color: var(--green); border-color: var(--green); }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="container">
      <div class="top-bar-inner">
        <a href="index.html#activities" class="back-link">
          <i class="fas fa-arrow-left"></i> <span data-i18n="nav.about">На главную</span>
        </a>
        <span class="site-name">Пеликан Алаколь</span>
        <div class="lang-switcher"></div>
      </div>
    </div>
  </div>

  <main>
    <div class="container">
      <div class="page-header">
        <span class="section-tag" data-i18n="act.page.tag">На территории</span>
        <h1 class="page-title" data-i18n="act.page.title">Активности и досуг</h1>
        <p class="page-subtitle" data-i18n="act.page.sub">Расписание работы объектов и развлечений</p>
      </div>
      <div id="actGrid" class="act-grid">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i></div>
      </div>
    </div>
  </main>

  <script>
    const ICONS = {
      'ferry':                '⛴️',
      'animation':            '🎭',
      'pools':                '🏊',
      'shop':                 '🛍️',
      'evening-entertainment':'🎶',
      'bar-games':            '🎱',
    };

    fetch('activities.json')
      .then(r => r.json())
      .then(items => {
        const grid = document.getElementById('actGrid');
        grid.innerHTML = items.map(item => `
          <div class="act-card">
            <div class="act-icon">${ICONS[item.id] || '🌟'}</div>
            <div class="act-title">${item.title}</div>
            <div class="act-time"><i class="fas fa-clock"></i> ${item.time}</div>
            <div class="act-desc">${item.description}</div>
            <div class="act-location"><i class="fas fa-map-marker-alt"></i> ${item.location}</div>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('actGrid').innerHTML =
          '<p style="color:#b91c1c" data-i18n="acc.error.title">Ошибка загрузки данных</p>';
        if (window.i18n?.apply) window.i18n.apply();
      });
  </script>
  <script src="js/i18n.js"></script>
</body>
</html>
